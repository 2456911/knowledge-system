<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人认知体系 · 决策操作系统 v1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f8f8f8;
  --bg3: #f2f2f2;
  --bd: #e8e8e8;
  --t: #3d3229;
  --t2: #6b5d4f;
  --t3: #9e8e7e;
  --a: #c0713a;
  --ag: rgba(192,113,58,0.06);
  --agb: rgba(192,113,58,0.22);
  --g: #b8860b;
  --gg: rgba(184,134,11,0.06);
  --ggb: rgba(184,134,11,0.20);
  --gn: #5a8a5e;
  --gng: rgba(90,138,94,0.06);
  --gngb: rgba(90,138,94,0.20);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.10);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Serif SC', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", serif;
  background: var(--bg);
  color: var(--t);
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 15px;
  line-height: 1.8;
}

/* ===== SIDEBAR ===== */
#sd {
  width: 290px;
  background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
  border-right: 1px solid var(--bd);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.hd {
  padding: 28px 20px 20px;
  border-bottom: 1px solid var(--bd);
  background: linear-gradient(135deg, rgba(192,113,58,0.06) 0%, transparent 60%);
}
.hd h2 {
  font-size: 15px;
  font-weight: 700;
  color: var(--t);
  letter-spacing: 0.5px;
}
.hd small {
  font-size: 11px;
  color: var(--t3);
  display: block;
  margin-top: 2px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
#sb {
  margin: 12px 14px;
  padding: 9px 14px;
  background: rgba(255,255,255,0.9);
  border: 1px solid var(--bd);
  border-radius: 8px;
  color: var(--t);
  font-size: 13px;
  width: calc(100% - 28px);
  outline: none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  transition: border-color .2s, box-shadow .2s;
}
#sb:focus {
  border-color: var(--a);
  box-shadow: 0 0 0 3px var(--ag);
}
#sb::placeholder { color: var(--t3); }

/* ===== SEARCH RESULTS ===== */
#sr {
  display: none;
  position: absolute;
  left: 290px;
  top: 0;
  width: 320px;
  max-height: 80vh;
  overflow-y: auto;
  background: #fff;
  border: 1px solid var(--bd);
  border-radius: 0 0 var(--radius) 0;
  box-shadow: var(--shadow-lg);
  z-index: 200;
  padding: 8px 0;
}
#sr.show { display: block; }
.sri {
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  transition: background .15s;
}
.sri:last-child { border-bottom: none; }
.sri:hover { background: var(--ag); }
.sri-t { font-size: 13px; font-weight: 600; color: var(--t); margin-bottom: 2px; }
.sri-p { font-size: 11px; color: var(--t3); font-family: -apple-system, sans-serif; }
.sri-c { font-size: 12px; color: var(--t2); margin-top: 3px; line-height: 1.5;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sri-c mark { background: rgba(192,113,58,0.2); color: var(--t); padding: 0 1px; border-radius: 2px; }

/* ===== NAV ===== */
#nv { flex: 1; overflow-y: auto; padding: 8px 0 20px; }
#nv::-webkit-scrollbar { width: 4px; }
#nv::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 4px; }
.ns { margin-top: 2px; }
.nh {
  padding: 8px 16px 5px;
  font-size: 11px;
  font-weight: 700;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  transition: color .15s;
}
.nh:hover { color: var(--a); }
.nh .ar { font-size: 9px; transition: transform .2s; }
.ns.c .ar { transform: rotate(-90deg); }
.ns.c > .ni { display: none; }
.ni {
  padding: 6px 16px 6px 30px;
  font-size: 13.5px;
  color: var(--t2);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all .15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-radius: 0 6px 6px 0;
  margin: 1px 8px 1px 0;
}
.ni:hover { color: var(--a); background: var(--ag); }
.ni.ac {
  color: var(--a);
  background: var(--ag);
  border-left-color: var(--a);
  font-weight: 600;
}


/* ===== MAIN CONTENT ===== */
#mn { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#tp {
  padding: 12px 32px;
  border-bottom: 1px solid var(--bd);
  background: linear-gradient(90deg, rgba(192,113,58,0.04) 0%, transparent 100%);
  font-size: 13px;
  color: var(--t3);
  flex-shrink: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: 0.3px;
}
#ct {
  flex: 1;
  overflow-y: auto;
  padding: 40px 52px;
  max-width: 880px;
  scroll-behavior: smooth;
}
#ct::-webkit-scrollbar { width: 6px; }
#ct::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 4px; }

/* ===== PAGES ===== */
.pg { display: none; }
.pg.ac { display: block; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ===== TYPOGRAPHY ===== */
h1 {
  font-size: 28px;
  font-weight: 900;
  color: var(--t);
  margin-bottom: 8px;
  line-height: 1.35;
  letter-spacing: -0.3px;
}
.pm {
  color: var(--t3);
  font-size: 12px;
  margin-bottom: 28px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.tg {
  background: var(--bg3);
  border: 1px solid var(--bd);
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  color: var(--t3);
}
h2 {
  font-size: 19px;
  font-weight: 700;
  color: var(--t);
  margin: 32px 0 14px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--bg3);
  position: relative;
}
h2::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 40px;
  height: 2px;
  background: var(--a);
  border-radius: 1px;
}

/* ===== CLICKABLE SUB-SECTION HEADERS ===== */
.sec-head {
  cursor: pointer;
  transition: color .15s;
}
.sec-head:hover { color: var(--a); }
.sec-head .arr {
  display: inline-block;
  font-size: 12px;
  margin-left: 6px;
  color: var(--t3);
  transition: transform .2s, color .15s;
  font-family: -apple-system, sans-serif;
}
.sec-head:hover .arr { color: var(--a); }

/* ===== BACK LINK ===== */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--a);
  cursor: pointer;
  margin-bottom: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  transition: opacity .15s;
  padding: 4px 0;
}
.back-link:hover { opacity: 0.7; }

h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--t);
  margin: 22px 0 10px;
}
p { color: var(--t2); margin-bottom: 14px; }
bq {
  display: block;
  border-left: 3px solid var(--a);
  padding: 14px 20px;
  margin: 16px 0;
  background: linear-gradient(90deg, var(--ag), transparent);
  border-radius: 0 var(--radius) var(--radius) 0;
  color: var(--t2);
  font-style: italic;
  line-height: 1.85;
}
pre {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: var(--radius);
  padding: 18px 20px;
  font-family: "SF Mono", "Fira Code", Consolas, "Courier New", monospace;
  font-size: 13px;
  color: var(--t2);
  overflow-x: auto;
  margin: 16px 0;
  white-space: pre;
  line-height: 1.9;
  box-shadow: var(--shadow-sm);
}

/* ===== TABLES ===== */
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin: 16px 0;
  font-size: 13px;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--bd);
  box-shadow: var(--shadow-sm);
}
th {
  background: var(--bg3);
  padding: 10px 14px;
  text-align: left;
  color: var(--t);
  font-weight: 700;
  border-bottom: 2px solid var(--bd);
  font-size: 12px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: 0.3px;
}
td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  color: var(--t2);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: rgba(0,0,0,0.02); }

/* ===== LISTS ===== */
ul, ol { padding-left: 24px; color: var(--t2); margin: 12px 0; }
li { margin: 5px 0; line-height: 1.85; }
hr { border: none; border-top: 1px solid var(--bd); margin: 28px 0; }

/* ===== CARD GRIDS ===== */
.cg { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0; }

/* ===== SUB-LIST (vertical, clean) ===== */
.sub-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin: 16px 0;
  border: 1px solid var(--bd);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.sub-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  transition: background .15s;
}
.sub-item:last-child { border-bottom: none; }
.sub-item:hover { background: var(--ag); }
.sub-title {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--t);
  outline: none;
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 2px 6px;
  margin: -2px -6px;
  transition: border-color .15s, background .15s;
  min-height: 1.6em;
  line-height: 1.6;
}
.sub-title:focus {
  border-color: var(--a);
  background: rgba(255,255,255,0.9);
}
.sub-jump {
  width: 20px;
  height: 20px;
  min-width: 20px;
  border: 1.5px solid var(--bd);
  border-radius: 3px;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.sub-jump:hover {
  border-color: var(--a);
  background: var(--ag);
}
.sub-jump::after {
  content: '';
  width: 0;
  height: 0;
  border-left: 5px solid var(--t3);
  border-top: 3px solid transparent;
  border-bottom: 3px solid transparent;
  transition: border-color .15s;
}
.sub-jump:hover::after {
  border-left-color: var(--a);
}

/* ===== PILL CARDS ===== */
.pl {
  background: #ffffff;
  border: 1px solid var(--bd);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow-sm);
  transition: border-color .2s;
}
.pl:hover { border-color: var(--agb); }
.pn { font-size: 22px; font-weight: 900; color: var(--a); margin-bottom: 6px; }
.pt { font-weight: 700; color: var(--t); font-size: 14px; margin-bottom: 4px; }
.px { font-size: 12.5px; color: var(--t3); margin-top: 8px; line-height: 1.65; }

/* ===== HIGHLIGHT BOXES ===== */
.hb {
  background: linear-gradient(90deg, var(--ag), rgba(192,113,58,0.02));
  border: 1px solid var(--agb);
  border-radius: var(--radius);
  padding: 16px 22px;
  margin: 16px 0;
  color: var(--t2);
  box-shadow: var(--shadow-sm);
}
.hb.gd {
  background: linear-gradient(90deg, var(--gg), rgba(184,134,11,0.02));
  border-color: var(--ggb);
}
.hb.gn {
  background: linear-gradient(90deg, var(--gng), rgba(90,138,94,0.02));
  border-color: var(--gngb);
}
strong { color: var(--t); }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  #sd {
    width: 260px;
    position: absolute;
    z-index: 100;
    height: 100%;
    left: -260px;
    transition: left .3s;
    box-shadow: none;
  }
  #sd.open { left: 0; box-shadow: var(--shadow-lg); }
  #ct { padding: 24px 20px; }
  #sr { left: 0; width: 280px; }
}
</style>
</head>
<body>
<div id="sd">
  <div class="hd"><h2>认知体系</h2><small>Decision OS v1.0</small></div>
  <input id="sb" type="text" placeholder="搜索全部内容…" oninput="S(this.value)" onfocus="S(this.value)">
  <nav id="nv"></nav>
</div>
<div id="sr"></div>
<div id="mn">
  <div id="tp">总索引</div>
  <div id="ct"></div>
</div>

  },

  pr: {
    title: "实用主义", section: "底层操作系统",
    html: '<h1>高明的实用主义</h1><div class="pm"><span class="tg">道德</span><span class="tg">长期主义</span></div><bq>底线不动，方法灵活。道德是长期收益最高、风险最低的处事策略。</bq><h2>四条不可妥协的红线</h2><div class="hb gd" style="font-size:16px;font-weight:700;text-align:center;letter-spacing:2px">不违法 · 不害人 · 不违心 · 不损人利己</div><h2>四条落地规则</h2><ol><li><b>先划底线，再想办法</b> — 排除突破底线的方案，再穷尽正当方案</li><li><b>算大账不算小账</b> — 3年、5年后会带来什么？会不会埋雷？</li><li><b>优先找共赢方案</b> — 利他是长期利己的最可靠路径</li><li><b>守得住底线，放得开手脚</b></li></ol><h2>决策流程</h2><pre>1. 突破红线了吗？ → 突破了 → 不做\n2. 长期全局最优方案是什么？\n3. 有没有共赢方案？ → 有→优先 → 没有→选伤害最小的\n4. 做完之后我睡得着吗？ → 睡不着→重新考虑</pre>'
  },

  sf: {
    title: "与自己周旋", section: "底层操作系统",
    html: '<h1>与自己周旋</h1><div class="pm"><span class="tg">自我接纳</span><span class="tg">宁做我</span></div><bq>"我与我周旋久，宁做我" — 做我，从来不是做那个剔除了所有弱点的完美自我，而是做那个完整的、真实的、哪怕带着不堪与阴影，依然坦然活着的本我。</bq><h2>5步周旋方法</h2><div class="cg"><div class="pl"><div class="pn">01</div><div class="pt">停止敌我对抗</div><div class="px">用第三人称称呼自己。❌"我怎么这么嫉妒" → ✅"我此刻产生了嫉妒的情绪"。</div></div><div class="pl"><div class="pn">02</div><div class="pt">听懂情绪潜台词</div><div class="px">①最强烈的情绪？②被什么触发？③在告诉我什么核心需求？</div></div><div class="pl"><div class="pn">03</div><div class="pt">和平共处公约</div><div class="px">接纳情绪，约束行为。嫉妒允许产生但不诋毁别人。</div></div><div class="pl"><div class="pn">04</div><div class="pt">从纠错转向建设</div><div class="px">停止缺点日记，开启闪光记录。种满鲜花，杂草自然没有空间。</div></div><div class="pl"><div class="pn">05</div><div class="pt">周旋是常态</div><div class="px">一辈子的事，没有一劳永逸的终点。今天和解明天可能又拉扯，这太正常了。</div></div></div><h2>"宁做我"的三层含义</h2><ol><li><b>接纳完整的我</b> — 能慷慨付出的是你，会怕被消耗的也是你</li><li><b>不改掉所有缺点也配做自己</b> — 周旋的目的是和平共处，不是打赢</li><li><b>忠于内心，不迎合外界</b></li></ol>'

  ht: {
    title: "健康", section: "决策原则",
    html: '<h1>健康决策原则</h1><div class="pm"><span class="tg">健康</span><span class="tg">芒格</span><span class="tg">纳瓦尔</span></div><bq><b>核心规则：健康是第一核心资产，是一切复利的载体。没有健康，财富和幸福都归零。</b><br>芒格："我认识的聪明人没有一个不每天锻炼的。没有例外。"</bq>',
    subs: ["ht-pillar","ht-recover","ht-cross"]
  },
  "ht-pillar": {
    title: "四大健康支柱", parent: "ht",
    html: '<div class="back-link" onclick="G(\'ht\')">← 返回 健康</div><h1>四大健康支柱</h1><div class="pm"><span class="tg">健康</span><span class="tg">决策原则</span></div><div class="cg"><div class="pl"><div class="pn">💪</div><div class="pt">运动（每天30分钟）</div><div class="px">芒格铁律：每天运动没有例外。心率60%-70%。工作时段10:30/14:30/16:00各10分钟跳绳。</div></div><div class="pl"><div class="pn">😴</div><div class="pt">睡眠（7.5小时）</div><div class="px">23:00入睡|7:00起床，5个完整90分钟周期。睡前1小时关电子设备。</div></div><div class="pl"><div class="pn">🥗</div><div class="pt">饮食（7分饱+低糖低油）</div><div class="px">早：高蛋白+慢碳。午：7分饱。晚：清淡少碳水。上午1杯黑咖啡，下午2点后不碰。</div></div><div class="pl"><div class="pn">⚡</div><div class="pt">精力管理</div><div class="px">最高精力→自我提升。中等→工作保达标。剩余→休息。禁忌：把最高精力给工作。</div></div></div>'
  },
  "ht-recover": {
    title: "失控恢复流程", parent: "ht",
    html: '<div class="back-link" onclick="G(\'ht\')">← 返回 健康</div><h1>失控恢复流程</h1><div class="pm"><span class="tg">健康</span><span class="tg">决策原则</span></div><pre>1. 暂停觉察（3次深呼吸）→ 我在逃避什么？\n2. 回到底层逻辑 → 健康是一切的基础\n3. 小步行动 → 今天走15分钟/今晚不熬夜\n4. 一次失控 ≠ 前功尽弃 → 尽快回来</pre>'
  },
  "ht-cross": {
    title: "交叉验证", parent: "ht",
    html: '<div class="back-link" onclick="G(\'ht\')">← 返回 健康</div><h1>交叉验证</h1><div class="pm"><span class="tg">健康</span><span class="tg">决策原则</span></div><table><tr><th>学科</th><th>健康决策应用</th></tr><tr><td>生物学</td><td>进化论：久坐是反进化的</td></tr><tr><td>数学概率</td><td>复利：每天30分钟，30年质的飞跃</td></tr><tr><td>经济学</td><td>机会成本：不运动的代价巨大</td></tr><tr><td>哲学</td><td>反面思考：最差情况是什么？</td></tr><tr><td>历史</td><td>二阶效应：今天熬夜→明天精力差→长期损失</td></tr></table>'

  "pp-steps": {
    title: "识人5步法", parent: "pp",
    html: '<div class="back-link" onclick="G(\'pp\')">← 返回 识人</div><h1>识人5步法</h1><div class="pm"><span class="tg">识人</span><span class="tg">决策原则</span></div><div class="cg"><div class="pl"><div class="pn">01</div><div class="pt">剥离表象</div><div class="px">不听他说什么，只看他做什么。嘴炮=财务造假。</div></div><div class="pl"><div class="pn">02</div><div class="pt">锚定驱动力</div><div class="px">求安全/求利益/求意义自尊。利益冲突场景最能看清。</div></div><div class="pl"><div class="pn">03</div><div class="pt">验证底盘</div><div class="px">人品+情绪稳定性+言行一致。无底线=无护城河。</div></div><div class="pl"><div class="pn">04</div><div class="pt">回看历史</div><div class="px">3-5年一贯表现 > 当下态度 > 一次高光。</div></div><div class="pl"><div class="pn">05</div><div class="pt">划定仓位</div><div class="px">90-100:核心重仓 | 70-89:持有 | 60-69:轻仓 | &lt;60:清仓</div></div></div>'
  },

  rl: {
    title: "关系幸福", section: "决策原则",
    html: '<h1>关系与幸福原则</h1><div class="pm"><span class="tg">关系</span><span class="tg">幸福</span><span class="tg">爱</span></div><bq><b>核心规则：先修己再爱人，以给予为核心，以尊重为前提。幸福是活成了对的人之后自然而然的馈赠。</b></bq>',

  "rl-love": {
    title: "爱的三条铁律", parent: "rl",
    html: '<div class="back-link" onclick="G(\'rl\')">← 返回 关系幸福</div><h1>爱的三条铁律</h1><div class="pm"><span class="tg">关系幸福</span><span class="tg">决策原则</span></div><div class="cg"><div class="pl"><div class="pn">01</div><div class="pt">先修己再爱人</div><div class="px">你给不出你没有的东西。自己没有安全感→只能通过控制获得。</div></div><div class="pl"><div class="pn">02</div><div class="pt">以给予为核心</div><div class="px">不是"你要满足我的期待"，而是"我愿意给你支持与接纳"。</div></div><div class="pl"><div class="pn">03</div><div class="pt">以尊重为前提</div><div class="px">先好奇"他为什么会这么选"。没有尊重的爱=支配与占有。</div></div></div>'

  "rl-dim": {

  "rl-pain": {
    title: "面对痛苦的三步法", parent: "rl",
    html: '<div class="back-link" onclick="G(\'rl\')">← 返回 关系幸福</div><h1>面对痛苦的三步法</h1><div class="pm"><span class="tg">关系幸福</span><span class="tg">决策原则</span></div><ol><li><b>先接纳，不抗拒</b> — 痛苦是常态</li><li><b>再拆解，不焦虑</b> — 可控的穷尽办法，不可控的彻底接纳</li><li><b>终迭代，不浪费</b> — 把痛苦变成优化操作系统的机会</li></ol><div class="hb">享乐适应：外部事件带来的幸福感半年内回归基线 → 这套体系给你的不是一次性快乐，而是持续创造幸福的能力。</div>'

  "rv-compare": {

    html: '<div class="back-link" onclick="G(\'rv\')">← 返回 迭代机制</div><h1>好的复盘 vs 坏的复盘</h1><div class="pm"><span class="tg">复盘迭代</span></div><table><tr><th>坏的</th><th>好的</th></tr><tr><td>罗列事件</td><td>挖到底层动机和模型失效原因</td></tr><tr><td>"要更努力"</td><td>"下次遇到X情况，我按Y原则行动"</td></tr><tr><td>只复盘失败</td><td>也复盘成功（哪个模型奏效了？）</td></tr><tr><td>复盘但不更新体系</td><td>每次都有具体的体系更新动作</td></tr></table>'
  },
  "rv-signal": {

    html: '<div class="back-link" onclick="G(\'rv\')">← 返回 迭代机制</div><h1>体系进化信号</h1><div class="pm"><span class="tg">复盘迭代</span></div><ul><li>遇到新情况，现有原则无法覆盖 → 添加新原则</li><li>某条原则反复无效 → 淘汰或修改</li><li>对某个概念有更深的理解 → 更新笔记</li><li>同样错误超过3次 → 原则没内化，换方式训练</li></ul>'
  },

  tp: {
    title: "每日模板", section: "复盘迭代",
    html: '<h1>每日复盘模板</h1><div class="pm"><span class="tg">模板</span><span class="tg">每日</span></div><bq>每天晚上22:30-23:00用10分钟完成。</bq><h2>今日复盘</h2><div class="hb"><p><b>日期：</b>YYYY-MM-DD</p><br><p><b>1. 今天我哪一次被情绪/外界带跑了？</b></p><p style="color:var(--t3);font-size:13px">（具体事件，一句话描述）</p><br><p><b>2. 当时我的真实动机是什么？</b></p><p style="color:var(--t3);font-size:13px">（求认可？怕失去？焦虑？嫉妒？）</p><br><p><b>3. 下次用哪条原则/模型可以提前拦住自己？</b></p><p style="color:var(--t3);font-size:13px">（具体到某条决策原则或思维模型）</p></div><h2>人生CEO日检</h2><div class="hb gn"><p><b>今天积累的资产：</b></p><p style="color:var(--t3);font-size:13px">（能力/知识/健康/人脉/钱）</p><br><p><b>今天减少的负债：</b></p><p style="color:var(--t3);font-size:13px">（内耗/坏习惯/无效社交）</p><br><p><b>精力ROE评估（1-5分）：</b></p><p style="color:var(--t3);font-size:13px">1=精力全浪费 | 5=最高质量精力全部用于自我提升</p></div><h2>明日重点</h2><div class="hb"><ol><li style="color:var(--t3)">（重点1）</li><li style="color:var(--t3)">（重点2）</li><li style="color:var(--t3)">（重点3）</li></ol></div>'

// ===== SECTION TREE (for sidebar grouping) =====
var TREE = [
  { name: "总览", items: ["home"] },
  { name: "底层操作系统", items: ["wv","mc","pr","sf"] },
  { name: "思维模型栅格", items: ["ps","ma","ec","bi","acc","ph","hi"] },
  { name: "决策原则", items: ["ht","pp","iv","rl","sm"] },
  { name: "复盘迭代", items: ["rv","tp"] }
];

var curId = "home";

// ===== INIT: build sidebar =====
function buildNav() {
  var nv = document.getElementById("nv");
  var html = "";
  TREE.forEach(function(sec) {
    html += '<div class="ns" data-sec="' + sec.name + '">';
    html += '<div class="nh" onclick="toggleSec(this)"><span class="ar">▾</span>' + sec.name + '</div>';
    sec.items.forEach(function(id) {
      var d = D[id];
      if (!d) return;
      html += '<div class="ni" data-id="' + id + '" onclick="G(\'' + id + '\',this)">' + d.title + '</div>';
    });
    html += '</div>';
  });
  nv.innerHTML = html;
}

// ===== TOGGLE SECTION =====
function toggleSec(el) {
  var ns = el.parentElement;
  ns.classList.toggle("c");
}

// ===== GO TO PAGE =====
function G(id, el) {
  // Hide search results
  document.getElementById("sr").classList.remove("show");

  var d = D[id];
  if (!d) return;

  // Determine parent page for breadcrumb
  var parentId = d.parent || null;
  var parentTitle = parentId ? D[parentId].title : "";

  // Build breadcrumb
  var breadcrumb = "";
  if (d.section) breadcrumb = d.section;
  if (parentId && parentTitle) {
    breadcrumb = (breadcrumb ? breadcrumb + " › " : "") + parentTitle;
  }
  breadcrumb += (breadcrumb ? " › " : "") + d.title;
  document.getElementById("tp").textContent = breadcrumb;

  // Render page content
  var ct = document.getElementById("ct");
  ct.scrollTop = 0;

  // If page has subs, render as vertical list with editable titles + jump buttons
  var html = d.html;
  if (d.subs && d.subs.length > 0) {
    html += '<h2>子章节</h2><div class="sub-list">';
    d.subs.forEach(function(sid) {
      var sd = D[sid];
      if (!sd) return;
      html += '<div class="sub-item">';
      html += '<span class="sub-title" contenteditable="true" data-id="' + sid + '">' + sd.title + '</span>';
      html += '<div class="sub-jump" onclick="G(\'' + sid + '\')" title="打开详情"></div>';
      html += '</div>';
    });
    html += '</div>';
  }

  ct.innerHTML = '<div class="pg ac">' + html + '</div>';

  // Update sidebar active state
  document.querySelectorAll(".ni").forEach(function(n) { n.classList.remove("ac"); });
  if (el) {
    el.classList.add("ac");
  } else {
    var navEl = document.querySelector('[data-id="' + id + '"]');
    if (navEl) navEl.classList.add("ac");
  }

  curId = id;
}

// ===== GLOBAL SEARCH =====
function S(q) {
  var sr = document.getElementById("sr");
  q = q.trim().toLowerCase();

  if (!q) {
    sr.classList.remove("show");
    return;
  }

  // Build search index: scan all pages' html content
  var results = [];
  Object.keys(D).forEach(function(id) {
    var d = D[id];
    // Skip pages that are just parent indexes with subs (search subs instead)
    var text = d.html.replace(/<[^>]+>/g, " ").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&amp;/g,"&").replace(/\s+/g, " ").trim();

    var idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return;

    // Extract context around match
    var start = Math.max(0, idx - 20);
    var end = Math.min(text.length, idx + q.length + 40);
    var snippet = (start > 0 ? "…" : "") + text.substring(start, end) + (end < text.length ? "…" : "");

    // Determine breadcrumb
    var bc = "";
    if (d.section) bc = d.section;
    if (d.parent && D[d.parent]) bc += (bc ? " › " : "") + D[d.parent].title;
    bc += (bc ? " › " : "") + d.title;

    results.push({
      id: id,
      title: d.title,
      breadcrumb: bc,
      snippet: snippet,
      match: q
    });
  });

  // Render results
  if (results.length === 0) {
    sr.innerHTML = '<div style="padding:20px;text-align:center;color:var(--t3);font-size:13px">未找到匹配内容</div>';
  } else {
    var html = "";
    results.forEach(function(r) {
      // Highlight match
      var re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
      var hl = r.snippet.replace(re, "<mark>$1</mark>");
      html += '<div class="sri" onclick="G(\'' + r.id + '\');document.getElementById(\'sb\').value=\'\';document.getElementById(\'sr\').classList.remove(\'show\')">';
      html += '<div class="sri-t">' + r.title + '</div>';
      html += '<div class="sri-p">' + r.breadcrumb + '</div>';
      html += '<div class="sri-c">' + hl + '</div>';
      html += '</div>';
    });
    sr.innerHTML = html;
  }
  sr.classList.add("show");
}

// Close search on click outside
document.addEventListener("click", function(e) {
  var sr = document.getElementById("sr");
  var sb = document.getElementById("sb");
  if (!sr.contains(e.target) && e.target !== sb) {
    sr.classList.remove("show");
  }
});

// ===== INIT =====
buildNav();
G("home");
</script>
